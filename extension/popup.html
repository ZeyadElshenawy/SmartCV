<!DOCTYPE html>
<html>
<head>
  <title>SmartCV Agent</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; width: 300px; padding: 16px; margin: 0; }
    h2 { margin-top: 0; color: #1a56db; font-size: 18px; }
    p { color: #4b5563; font-size: 14px; margin-bottom: 16px; }
    button {
      background-color: #2563eb; color: white; border: none; padding: 10px 16px;
      border-radius: 6px; font-weight: bold; width: 100%; cursor: pointer; transition: background 0.2s;
    }
    button:hover { background-color: #1d4ed8; }
    #status { margin-top: 12px; font-size: 13px; text-align: center; color: #059669; display: none; }
    #error { margin-top: 12px; font-size: 13px; text-align: center; color: #dc2626; display: none; }
    
    /* Simple spinner */
    .loader {
      border: 3px solid #f3f3f3; border-top: 3px solid white; border-radius: 50%;
      width: 14px; height: 14px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .auth-status {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
      font-size: 13px;
    }
    .auth-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 8px;
    }
    .dot-amber { background-color: #f59e0b; }
    .dot-red { background-color: #ef4444; }
    .dot-green { background-color: #10b981; }
    .auth-text { color: #4b5563; }
    .auth-link { color: #2563eb; text-decoration: none; margin-left: 4px; }
  </style>
</head>
<body>
  <h2>SmartCV Agent</h2>
  <div class="auth-status" id="auth-status">
      <div class="auth-dot dot-amber" id="auth-dot"></div>
      <span class="auth-text" id="auth-text">Checking connection...</span>
  </div>
  <p>Found a job you like? Click below to extract details and save it directly to your SmartCV Kanban board.</p>
  
  <div>
      <label for="api-key" style="font-size: 12px; color: #6b7280; display: block; margin-bottom: 4px;">SmartCV Extension Key (from settings)</label>
      <input type="password" id="api-key" placeholder="Enter API Key" style="width: 100%; padding: 8px; margin-bottom: 16px; box-sizing: border-box; border: 1px solid #d1d5db; border-radius: 4px;">
  </div>

  <button id="extract-btn">Extract & Save Job</button>
  
  <div id="status">✓ Job successfully saved to board!</div>
  <div id="error">✗ Failed to save job. Try again.</div>

  <script src="popup.js"></script>
</body>
</html>
