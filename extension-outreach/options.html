<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>SmartCV Outreach — Options</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 520px; margin: 40px auto; padding: 0 24px; color: #111827; }
        h1 { font-size: 20px; margin-bottom: 6px; }
        p.muted { color: #6b7280; font-size: 13px; }
        label { display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: #6b7280; margin-bottom: 4px; margin-top: 16px; }
        input { width: 100%; box-sizing: border-box; padding: 9px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; }
        button { background: #2563eb; color: #fff; border: 0; padding: 9px 16px; border-radius: 6px; font-size: 14px; margin-top: 18px; cursor: pointer; }
        button:hover { background: #1d4ed8; }
        .ok { color: #047857; font-size: 13px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>SmartCV Outreach</h1>
    <p class="muted">Paste the token from your SmartCV pairing page. The extension only ever sends this token to your SmartCV host — never to LinkedIn.</p>

    <label for="host">SmartCV host</label>
    <input type="text" id="host" placeholder="http://127.0.0.1:8000">

    <label for="token">Outreach token</label>
    <input type="text" id="token" placeholder="paste UUID from /profiles/extension/pair/">

    <button id="save">Save</button>
    <span id="ok" class="ok" style="display:none;">Saved.</span>

    <script src="options.js"></script>
</body>
</html>
