{% extends 'base.html' %}

{% block title %}Page Not Found | SmartCV{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4">
    <div class="text-center max-w-lg">
        <div class="relative mb-8">
            <span class="text-[140px] font-extrabold text-transparent bg-clip-text bg-gradient-to-br from-blue-200 to-indigo-300 dark:from-gray-700 dark:to-gray-800 leading-none select-none">404</span>
            <div class="absolute inset-0 flex items-center justify-center">
                <svg class="w-20 h-20 text-rn-blue/30 dark:text-rn-gold/30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
        </div>
        <h1 class="text-2xl font-extrabold text-rn-navy dark:text-white mb-3">Page not found</h1>
        <p class="text-gray-500 dark:text-gray-400 mb-8 leading-relaxed">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <a href="{% url 'dashboard' %}"
               class="px-8 py-3 bg-rn-blue hover:bg-rn-blue-hover text-white font-bold rounded-rn-pill shadow-sm transition-all hover:-translate-y-0.5 duration-200">
                Go to Dashboard
            </a>
            <button onclick="history.back()"
                    class="px-8 py-3 bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 text-rn-navy dark:text-gray-200 font-bold rounded-rn-pill transition-colors">
                Go Back
            </button>
        </div>
    </div>
</div>
{% endblock %}
