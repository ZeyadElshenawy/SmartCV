{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen bg-gray-50 dark:bg-gray-900 flex items-center justify-center px-4 py-12 transition-colors">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-rn-navy dark:text-gray-100 tracking-tight">Sign In</h1>
            <p class="mt-2 text-gray-600 dark:text-gray-400 font-medium">Welcome back to SmartCV</p>
        </div>
        
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 overflow-hidden transition-colors">
            <div class="p-8 sm:p-10">
                <form method="post" class="space-y-6">
                    {% csrf_token %}
                    
                    {% if messages %}
                        {% for message in messages %}
                        <div class="bg-red-50 border-l-4 border-red-500 text-red-700 px-4 py-3 rounded text-sm font-medium mb-6">
                            {{ message }}
                        </div>
                        {% endfor %}
                    {% endif %}
                    
                    <div>
                        <label for="email" class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Email Address</label>
                        <input type="email" id="email" name="email" required 
                               class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 rounded-md focus:ring-2 focus:ring-rn-blue focus:border-rn-blue transition-colors outline-none font-medium">
                    </div>
                    
                    <div>
                        <label for="password" class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Password</label>
                        <input type="password" id="password" name="password" required 
                               class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 rounded-md focus:ring-2 focus:ring-rn-blue focus:border-rn-blue transition-colors outline-none font-medium">
                    </div>
                    
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <input id="remember-me" name="remember-me" type="checkbox" 
                                   class="h-4 w-4 text-rn-blue focus:ring-rn-blue border-gray-300 dark:border-gray-600 rounded">
                            <label for="remember-me" class="ml-2 block text-sm font-medium text-gray-700 dark:text-gray-300">Remember me</label>
                        </div>
                        
                        <div class="text-sm">
                            <a href="{% url 'password_reset' %}" class="font-bold text-rn-blue hover:text-rn-blue-hover transition-colors">
                                Forgot password?
                            </a>
                        </div>
                    </div>
                    
                    <button type="submit" 
                            class="w-full inline-flex justify-center items-center bg-rn-blue text-white py-3.5 rounded-rn-pill font-bold shadow-md hover:bg-rn-blue-hover hover:-translate-y-0.5 transition-all mt-4">
                        Sign In
                    </button>
                </form>
            </div>
            
            <div class="bg-gray-50 dark:bg-gray-800/80 border-t border-gray-200 dark:border-gray-700 px-8 py-6 text-center transition-colors">
                <p class="text-sm font-medium text-gray-600 dark:text-gray-400">
                    Don't have an account? 
                    <a href="{% url 'register' %}" class="font-bold text-rn-blue hover:text-rn-blue-hover transition-colors">Sign up</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
