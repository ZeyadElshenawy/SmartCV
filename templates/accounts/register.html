{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen bg-gray-50 dark:bg-gray-900 flex items-center justify-center px-4 py-12 transition-colors">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-rn-navy dark:text-gray-100 tracking-tight">Create Account</h1>
            <p class="mt-2 text-gray-600 dark:text-gray-400 font-medium">Start optimizing your resumes today</p>
        </div>
        
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 overflow-hidden transition-colors">
            <div class="p-8 sm:p-10">
                <form method="post" class="space-y-6">
                    {% csrf_token %}
                    
                    {% if messages %}
                        {% for message in messages %}
                        <div class="bg-red-50 border-l-4 border-red-500 text-red-700 px-4 py-3 rounded text-sm font-medium mb-6">
                            {{ message }}
                        </div>
                        {% endfor %}
                    {% endif %}
                    
                    <div>
                        <label for="email" class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Email Address</label>
                        <input type="email" id="email" name="email" required 
                               class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 rounded-md focus:ring-2 focus:ring-rn-blue focus:border-rn-blue transition-colors outline-none font-medium">
                    </div>
                    
                    <div>
                        <label for="password" class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Password</label>
                        <input type="password" id="password" name="password" required 
                               class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 rounded-md focus:ring-2 focus:ring-rn-blue focus:border-rn-blue transition-colors outline-none font-medium">
                    </div>
                    
                    <div>
                        <label for="confirm_password" class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Confirm Password</label>
                        <input type="password" id="confirm_password" name="confirm_password" required 
                               class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 rounded-md focus:ring-2 focus:ring-rn-blue focus:border-rn-blue transition-colors outline-none font-medium">
                    </div>
                    
                    <button type="submit" 
                            class="w-full inline-flex justify-center items-center bg-rn-gold text-rn-navy py-3.5 rounded-rn-pill font-bold shadow-md hover:bg-rn-gold-hover hover:-translate-y-0.5 transition-all mt-4">
                        Create Account
                        <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </button>
                </form>
            </div>
            
            <div class="bg-gray-50 dark:bg-gray-800/80 border-t border-gray-200 dark:border-gray-700 px-8 py-6 text-center transition-colors">
                <p class="text-sm font-medium text-gray-600 dark:text-gray-400">
                    Already have an account? 
                    <a href="{% url 'login' %}" class="font-bold text-rn-blue hover:text-rn-blue-hover transition-colors">Sign in</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
