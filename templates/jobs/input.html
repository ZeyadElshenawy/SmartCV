{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 py-8" x-data="{ activeTab: 'url' }">
    <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
        <h1 class="text-3xl font-bold text-gray-900 mb-2">Add New Job Application</h1>
        <p class="text-gray-600 mb-8">Paste a LinkedIn URL or enter the job details manually.</p>
        
        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded mb-6">
            {{ error }}
        </div>
        {% endif %}
        
        <!-- Tab Buttons -->
        <div class="flex border-b border-gray-200 mb-6">
            <button 
                @click="activeTab = 'url'" 
                :class="activeTab === 'url' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'"
                class="py-2 px-4 border-b-2 font-medium transition-colors"
            >
                LinkedIn URL
            </button>
            <button 
                @click="activeTab = 'text'" 
                :class="activeTab === 'text' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'"
                class="py-2 px-4 border-b-2 font-medium transition-colors"
            >
                Paste Job Description
            </button>
        </div>
        
        <!-- URL Input Tab -->
        <div x-show="activeTab === 'url'" x-cloak>
            <form method="post" class="space-y-6" onsubmit="showLoading('Scraping LinkedIn and extracting skills with AI... (this may take up to 60s if the AI is waking up)')">
                {% csrf_token %}
                <input type="hidden" name="input_method" value="url">
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        LinkedIn Job URL
                    </label>
                    <input 
                        type="url" 
                        name="job_url" 
                        placeholder="https://www.linkedin.com/jobs/view/..." 
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    >
                    <p class="text-sm text-gray-500 mt-2">We'll automatically extract the job title, company, and description.</p>
                </div>
                
                <button 
                    type="submit"
                    class="w-full bg-blue-600 text-white py-3 rounded-lg font-medium hover:bg-blue-700 transition-colors"
                >
                    Scrape &amp; Analyze Fit
                </button>
            </form>
        </div>
        
        <!-- Text Input Tab -->
        <div x-show="activeTab === 'text'" x-cloak>
            <form method="post" class="space-y-6" onsubmit="showLoading('Extracting skills and computing your match score... (this may take up to 60s if the AI is waking up)')">
                {% csrf_token %}
                <input type="hidden" name="input_method" value="text">
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Job Title
                    </label>
                    <input 
                        type="text" 
                        name="job_title" 
                        placeholder="e.g., Senior Software Engineer" 
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    >
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Company
                    </label>
                    <input 
                        type="text" 
                        name="company" 
                        placeholder="e.g., Google" 
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    >
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Job Description
                    </label>
                    <textarea 
                        name="job_description" 
                        rows="10" 
                        placeholder="Paste the full job description here..."
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    ></textarea>
                </div>
                
                <button 
                    type="submit"
                    class="w-full bg-blue-600 text-white py-3 rounded-lg font-medium hover:bg-blue-700 transition-colors"
                >
                    Analyze Fit
                </button>
            </form>
        </div>
    </div>
</div>

{% endblock %}
